<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ero</title>

<style>
html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:url("photo.jpeg") center/cover no-repeat fixed;
  font-family:Arial, sans-serif;
}

canvas{
  position:absolute;
  top:0;
  left:0;
}

#loveScreen{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  backdrop-filter:blur(8px);
  background:rgba(0,0,0,0.65);
  opacity:0;
  pointer-events:none;
  transition:opacity .8s ease;
}

#loveScreen.active{
  opacity:1;
  pointer-events:auto;
}

#loveText{
  font-size:clamp(40px,8vw,120px);
  color:#ff007f;
  text-align:center;
  text-shadow:
    0 0 10px #ff007f,
    0 0 20px #ff007f,
    0 0 40px #ff1493,
    0 0 80px #ff1493;
  animation:breath 3s ease-in-out infinite;
}

@keyframes breath{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.08)}
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="loveScreen">
  <div id="loveText">SENİ ÇOOOK SEVİYORUM</div>
</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const loveScreen = document.getElementById("loveScreen");

let W,H;
function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let pointer={x:0,y:0,active:false};

window.addEventListener("mousemove",e=>{
  pointer.x=e.clientX;
  pointer.y=e.clientY;
  pointer.active=true;
});

window.addEventListener("touchmove",e=>{
  pointer.x=e.touches[0].clientX;
  pointer.y=e.touches[0].clientY;
  pointer.active=true;
});

const particles=[];
const N=900;

function randomColor(){
  return `hsl(${Math.random()*360},80%,60%)`;
}

for(let i=0;i<N;i++){
  particles.push({
    x:Math.random()*W,
    y:Math.random()*H,
    vx:0,
    vy:0,
    color:randomColor(),
    trail:[]
  });
}

let scatter=false;
let scatterTime=0;

let clickCount=0;
let lastClick=0;

const hearts=[];

function burst(){
  const now=Date.now();

  if(now-lastClick<500){
    clickCount++;
  } else {
    clickCount=1;
  }

  lastClick=now;

  if(clickCount>=5){
    activateLoveMode();
    clickCount=0;
    return;
  }

  scatter=true;
  scatterTime=40;

  for(let p of particles){
    const angle=Math.random()*Math.PI*2;
    const speed=Math.random()*8+3;
    p.vx=Math.cos(angle)*speed;
    p.vy=Math.sin(angle)*speed;
  }

  for(let i=0;i<70;i++){
    hearts.push({
      x:pointer.x,
      y:pointer.y,
      vx:(Math.random()-0.5)*14,
      vy:(Math.random()-0.5)*14,
      size:Math.random()*20+10,
      life:60
    });
  }
}

function activateLoveMode(){
  loveScreen.classList.add("active");
}

window.addEventListener("click",burst);
window.addEventListener("touchstart",burst);

function drawHeart(x,y,size){
  ctx.beginPath();
  ctx.moveTo(x,y);
  ctx.bezierCurveTo(x-size,y-size,x-size*1.5,y+size/2,x,y+size);
  ctx.bezierCurveTo(x+size*1.5,y+size/2,x+size,y-size,x,y);
  ctx.fillStyle="#ff1493";
  ctx.fill();
}

function animate(){
  requestAnimationFrame(animate);

  if(loveScreen.classList.contains("active")) return;

  ctx.clearRect(0,0,W,H);

  if(scatterTime>0){
    scatterTime--;
  } else {
    scatter=false;
  }

  for(let p of particles){

    if(pointer.active && !scatter){
      let dx=pointer.x-p.x;
      let dy=pointer.y-p.y;
      p.vx+=dx*0.002;
      p.vy+=dy*0.002;
    }

    p.vx*=0.94;
    p.vy*=0.94;

    p.x+=p.vx;
    p.y+=p.vy;

    p.trail.push({x:p.x,y:p.y});
    if(p.trail.length>6) p.trail.shift();

    for(let i=0;i<p.trail.length;i++){
      let t=p.trail[i];
      ctx.fillStyle=p.color;
      ctx.globalAlpha=i/p.trail.length;
      ctx.fillRect(t.x,t.y,2,2);
    }

    ctx.globalAlpha=1;
    ctx.fillStyle=p.color;
    ctx.fillRect(p.x,p.y,2,2);
  }

  for(let i=hearts.length-1;i>=0;i--){
    let h=hearts[i];
    h.x+=h.vx;
    h.y+=h.vy;
    h.life--;
    drawHeart(h.x,h.y,h.size);
    if(h.life<=0) hearts.splice(i,1);
  }
}
animate();
</script>

</body>
</html>
